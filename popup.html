<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>uContact Bot v2</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>uContact Bot</h1>
      <span class="version">v2.0</span>
    </div>

    <div class="alert alert-info" id="connectionAlert" style="display: none;">
      ⚠️ Abre uContact para usar el bot
    </div>

    <div class="controls">
      <button id="startBtn" class="btn btn-start">▶ Iniciar</button>
      <button id="stopBtn" class="btn btn-stop" disabled>⏹ Detener</button>
    </div>

    <div class="settings">
      <div class="setting-group">
        <label for="interval">Intervalo:</label>
        <select id="interval">
          <option value="1">Cada 1h</option>
          <option value="2">Cada 2h</option>
          <option value="3">Cada 3h</option>
          <option value="4">Cada 4h</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="operador">Operador:</label>
        <input type="text" id="operador" placeholder="Tu nombre" maxlength="50">
      </div>
    </div>

    <div class="status-box">
      <div class="status-line">
        <span class="status-label">Estado:</span>
        <span class="status-value" id="status">Detenido</span>
      </div>
      <div class="status-line" id="processingLine" style="display: none;">
        <span class="status-label">Procesando:</span>
        <span class="processing-indicator">●●●</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat-item">
        <span class="stat-label">Enviados</span>
        <span class="stat-value" id="enviados">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Anclados</span>
        <span class="stat-value" id="anclados">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Cerrados</span>
        <span class="stat-value" id="cerrados">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Errores</span>
        <span class="stat-value" id="errores">0</span>
      </div>
    </div>

    <div class="footer">
      <small>v2.0 | Registros guardados en Google Sheets</small>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
